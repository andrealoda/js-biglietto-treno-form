<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./assets/css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"
        defer></script>
    <script src="./assets/js/main.js" defer></script>
</head>

<body">
    <div class="container m-5 p-5 border border-secondary-emphasis shadow rounded-5">
        <header>
            <div class="title text-center">
                <h1>CALCOLA IL PREZZO DEL TUO BIGLIETTO</h1>
            </div>
        </header>
        <main>
            <div class="input-title text-center">
                <h2>INSERISCI I DATI DEL PASSEGGERO</h2>
            </div>
            <div class="user-inputs text-center ">
                <form>
                    <div class="inputs-set d-flex flex-row fst-italic">
                        <div class="mb-3 p-2 col-4">
                            <label for="name-input" class="form-label">Nome e Cognome</label>
                            <input type="text" class="form-control" id="name-input">
                        </div>
                        <div class="mb-3 p-2 col-4">
                            <label for="distance-input" class="form-label">Distanza da percorrere</label>
                            <input type="number" class="form-control" id="distance-input">
                        </div>
                        <div class="mb-3 p-2 col-4">
                            <label for="age-input" class="form-label">Et&agrave;</label>
                            <input type="number" class="form-control" id="age-input">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-danger" id="input-confirm-button">Genera il tuo
                        biglietto</button>
                </form>
            </div>
            <hr>
            <div class="ticket-section bg-alert rounded-5 mt-3">
                <div class="inputs-recap text-center mb-3">
                    <h2>IL TUO BIGLIETTO</h2>
                </div>
                <div class="ticket d-flex flex-row justify-content-center">
                    <div class="card mb-3" style="max-width: 540px;">
                        <div class="row g-0">
                            <div class="col-md-4">
                                <img src="./assets/img/ticket-image.jpg" class="img-fluid rounded-start" alt="...">
                            </div>
                            <div class="col-md-8">
                                <div class="card-body">
                                    <h5 class="card-title">Nome passeggero</h5>
                                    <p class="card-text">Prezzo del biglietto</p>
                                    <p class="card-text"><small class="text-body-secondary">Offerta</small>
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="recap bg-light p-3 rounded">
                    <ul class="recap-list list-group">
                        <li id="name" class="list-group-item"></li>
                        <li id="distance" class="list-group-item"></li>
                        <li id="age" class="list-group-item"></li>
                        <li id="ticket-price" class="list-group-item"></li>
                    </ul>
                </div>
            </div>





        </main>
    </div>
    </body>

</html>
